name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install docs dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Build mod jars
        run: ./gradlew jar :forge1201:jar

      - name: Upload NeoForge jar
        uses: actions/upload-artifact@v4
        with:
          name: Minedit-NeoForge
          path: build/libs/Minedit-NeoForge-*-v*.jar

      - name: Upload Forge jar
        uses: actions/upload-artifact@v4
        with:
          name: Minedit-Forge
          path: forge1201/build/libs/Minedit-Forge-*-v*.jar
